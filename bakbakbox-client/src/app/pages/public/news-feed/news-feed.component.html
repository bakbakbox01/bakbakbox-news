<div class="public-page" @fadeInUp>
  <app-page-hero
    [variant]="feedConfig().variant"
    [title]="title()"
    [subtitle]="subtitle()"
    [icon]="feedConfig().icon"
    [badge]="feedConfig().badge"
    [badgePulse]="feedConfig().badgePulse"
    [meta]="total() ? total() + ' stories' : ''"
  />

  <div class="public-page__body">
    @if (loading()) {
      <app-loading-spinner message="Loading stories..." />
    } @else if (!news().length) {
      <app-empty-state
        [icon]="feedConfig().emptyIcon"
        [title]="feedConfig().emptyTitle"
        message="We're working on fresh content. Check back soon or explore other sections."
      />
    } @else {
      @if (spotlight(); as lead) {
        <div class="feed-spotlight" @fadeInUp>
          <app-news-card [article]="lead" [featured]="true" />
        </div>
      }

      @if (gridNews().length) {
        <div class="row g-4" @listStagger>
          @for (item of gridNews(); track item._id; let i = $index) {
            <div class="col-md-6 col-lg-4">
              <app-news-card
                [article]="item"
                [rank]="trendingRank(i)"
              />
            </div>
          }
        </div>
      }

      <app-pagination
        [total]="total()"
        [page]="page()"
        [limit]="limit"
        (pageChange)="onPageChange($event)"
      />
    }
  </div>
</div>
