<div class="public-page" @fadeInUp>
  <app-page-hero
    variant="contact"
    title="Contact Us"
    subtitle="Have a story tip, feedback, or partnership inquiry? We'd love to hear from you."
    icon="✉️"
    badge="GET IN TOUCH"
  />

  <div class="public-page__body">
    @if (submitted()) {
      <div class="success-card" @scaleIn>
        <span class="success-card__icon">✅</span>
        <h2 class="success-card__title">Message sent!</h2>
        <p class="success-card__text">
          Thank you for reaching out. Our editorial team will get back to you within 1–2 business days.
        </p>
      </div>
    } @else {
      <div class="row g-4 g-xl-5">
        <div class="col-lg-7">
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="contact-form card border-0 shadow-sm" @fadeInUp>
            <div class="card-body p-4 p-md-5">
              <h2 class="contact-form__title">Send a message</h2>
              <div class="mb-3">
                <label class="form-label fw-medium" for="name">Name</label>
                <input id="name" class="form-control form-control-lg" formControlName="name" placeholder="Your name" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium" for="email">Email</label>
                <input id="email" type="email" class="form-control form-control-lg" formControlName="email" placeholder="you@example.com" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium" for="subject">Subject</label>
                <input id="subject" class="form-control form-control-lg" formControlName="subject" placeholder="What's this about?" />
              </div>
              <div class="mb-4">
                <label class="form-label fw-medium" for="message">Message</label>
                <textarea id="message" class="form-control form-control-lg" rows="5" formControlName="message" placeholder="Tell us more..."></textarea>
              </div>
              <button class="btn btn-primary btn-lg w-100 w-md-auto px-5 contact-form__submit" type="submit">
                Send Message →
              </button>
            </div>
          </form>
        </div>

        <div class="col-lg-5">
          <div class="contact-cards">
            @for (card of contactCards; track card.title) {
              <div class="contact-card" @fadeInUp>
                <span class="contact-card__icon">{{ card.icon }}</span>
                <div>
                  <strong class="contact-card__title">{{ card.title }}</strong>
                  <p class="contact-card__value mb-0">{{ card.value }}</p>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
