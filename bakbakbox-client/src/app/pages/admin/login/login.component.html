<div class="login-page min-vh-100 d-flex align-items-center justify-content-center">
  @if (isLoading()) {
    <app-loading-spinner [overlay]="true" message="Signing in..." />
  }

  <div class="login-card card shadow border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h1 class="h3 fw-bold mb-1">Admin Login</h1>
        <p class="text-muted mb-0">Sign in to manage Bak Bak Box News</p>
      </div>

      @if (errorMessage()) {
        <div class="alert alert-danger py-2" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          @if (getError('email')) {
            <mat-error>{{ getError('email') }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword() ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
          >
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (getError('password')) {
            <mat-error>{{ getError('password') }}</mat-error>
          }
        </mat-form-field>

        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-stretch align-items-sm-center gap-2 gap-sm-0 mb-4">
          <mat-checkbox formControlName="rememberMe">Remember me</mat-checkbox>
          <a routerLink="/" class="small text-decoration-none text-center text-sm-end">Back to site</a>
        </div>

        <button
          mat-flat-button
          color="primary"
          class="w-100 py-2"
          type="submit"
          [disabled]="isLoading()"
        >
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
