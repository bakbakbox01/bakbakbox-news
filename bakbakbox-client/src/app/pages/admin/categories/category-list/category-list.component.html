<app-page-header title="Manage Categories" subtitle="Organize news into categories">
  <button mat-flat-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon>
    Add Category
  </button>
</app-page-header>

<div class="filters card border-0 shadow-sm mb-4">
  <div class="card-body">
    <mat-form-field appearance="outline" class="w-100 mb-0">
      <mat-label>Search categories</mat-label>
      <input matInput [formControl]="searchControl" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>
</div>

@if (loading()) {
  <app-loading-spinner message="Loading categories..." />
} @else {
  <div class="table-card card border-0 shadow-sm">
    <div class="table-responsive">
      <table mat-table [dataSource]="categories()" class="w-100">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let row"><code>{{ row.slug }}</code></td>
        </ng-container>
        <ng-container matColumnDef="sortOrder">
          <th mat-header-cell *matHeaderCellDef>Order</th>
          <td mat-cell *matCellDef="let row">{{ row.sortOrder }}</td>
        </ng-container>
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <mat-chip [class.bg-success]="row.isActive" [class.bg-secondary]="!row.isActive">
              {{ row.isActive ? 'Active' : 'Inactive' }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button (click)="openDialog(row)" aria-label="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteCategory(row)" aria-label="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
    <mat-paginator
      [length]="total()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    />
  </div>
}
