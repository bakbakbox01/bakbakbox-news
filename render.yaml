# Render.com — Backend API deploy blueprint
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bakbakbox-api
    runtime: node
    rootDir: bakbakbox-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: bakbakbox-news
      - key: NEWS_SYNC_ENABLED
        value: true
      - key: NEWS_SYNC_INTERVAL_MS
        value: 30000
      - key: NEWS_SYNC_MAX_AGE_HOURS
        value: 48
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: Admin
      - key: ADMIN_LAST_NAME
        value: User
